{% load static %}
<html>
    <head>
        <title>signup</title>
        <link rel='stylesheet' href="{% static 'css/signup.css' %}">
    </head>
    <body>
        <div class="signup-box">
        <h3>singup</h3>
       

        

        <form action="{% url 'signup' %}" method="POST">
        {% csrf_token %}


        {% if messages %}
        {{ message.tags }}

        <div>
            {% for message in messages %}
            {{message}}
            {% endfor %}
        </div>

        {% endif %}
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Create a username (only letters and number)"><br>

             
            <label for="firstname">Firstname</label>
            <input type="text" id="firstname" name="firstname" placeholder="Enter your firstname"><br>

            
            <label for="lastname">Lastname</label>
            <input type="text" id="lastname" name="lastname" placeholder="Enter your lastname"><br>

            
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br>

            
            <label for="password">password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password"><br>

            
           

            <button type="submit">signup</button>
        </form>
         <div>
            <p>Alreday have an account? <a href ="{% url 'login' %}">login here<a/>
         </div>
        </div>
    </body>
</html>
